seed: 42

device: cuda

save_dir: ./checkpoints
save_interval: 5
exp_name: sr3_mnist_toy

train:
  epochs: 10
  lr: 0.0002
  batch_size: 64
  log_interval: 50

trainer_name: sr3

model:
  name: sr3
  params:
    in_channels: 2
    out_channels: 1
    model_channels: 64
    num_res_blocks: 2
    attention_resolutions: [7, 14]
    channel_mult: [1, 2, 2]
    dropout: 0.0
    num_heads: 4
    image_size: 28

diffusion:
  timesteps: 50
  schedule: cosine

data:
  task: super_resolution
  dataset: mnist
  root: ./data
  image_size: 28
  scale_factor: 2
  downsample_mode: bicubic
  upsample_mode: bicubic
  noise_std: 0.0
  value_range: minus_one_one
